<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixVolt | Diagnóstico de Ingeniería Avanzada</title>
    <style>
        :root { --accent: #ff6b00; --dark: #0f172a; --gray: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--gray); color: #334155; }
        header { background: var(--dark); color: var(--white); padding: 25px; text-align: center; border-bottom: 4px solid var(--accent); }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; } .logo span { color: var(--accent); }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        .search-card { background: var(--white); padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 30px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .solution-card { display: none; background: #1e293b; color: #f8fafc; padding: 30px; border-radius: 20px; border-left: 10px solid var(--accent); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .res-body { font-size: 17px; line-height: 1.6; margin: 15px 0; color: #cbd5e1; }
        .btn-wa { display: block; background: #25d366; color: white; text-align: center; padding: 20px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 19px; margin-top: 25px; box-shadow: 0 10px 20px rgba(37,211,102,0.2); }
        .loader { display: none; margin: 20px 0; font-weight: bold; color: var(--accent); }
        footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 12px; }
    </style>
</head>
<body>

<header><div class="logo">FIX<span>VOLT</span> ENGINEERING</div></header>

<div class="container">
    <div class="search-card">
        <h2>Asistente de Diagnóstico (Bases RU/PL)</h2>
        <p>Introduzca código de error o síntoma para consultar soluciones de ingeniería.</p>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Ej: Huawei 2062, MG Tirones, AdBlue, Tesla Ruido...">
            <button onclick="runRobot()">ANALIZAR</button>
        </div>
        <div id="loader" class="loader">CONSULTANDO DRIVE2 / DROM / FORUMHOUSE...</div>
    </div>

    <div id="result" class="solution-card">
        <div style="color:var(--accent); font-weight:bold; font-size:12px; text-transform:uppercase;">Informe Técnico Generado</div>
        <h3 id="res-title" style="margin:10px 0;"></h3>
        <div id="res-body" class="res-body"></div>
        <a href="https://wa.me/48512792481?text=" id="wa-link" class="btn-wa">SOLICITAR RECAMBIO / SOPORTE WHATSAPP</a>
    </div>
</div>

<footer>FixVolt.es | Hub Logístico Polonia | 2026</footer>

<script>
    const database = [
        // --- SOLAR / INVERSORES ---
        { keys: ["HUAWEI", "2062", "AISLAMIENTO"], res: "<b>Error 2062 (Huawei):</b> Resistencia de aislamiento baja. <br><b>Origen (Forumhouse.ru):</b> Humedad en conectores MC4 o micro-grietas en cableado DC. <br><b>Solución:</b> Limpiar con spray dieléctrico y sellar. Si persiste, el varistor interno requiere revisión." },
        { keys: ["SOLIS", "103", "I-ISO"], res: "<b>Solis Error 103 (I-ISO):</b> Fuga a tierra. <br><b>Origen:</b> Condensación en la caja de conexiones de los paneles. <br><b>Solución:</b> Secar bornes y ajustar umbral de sensibilidad en 'Advanced Settings' (Pass: 0010)." },
        { keys: ["DEYE", "BMS", "COM", "W03"], res: "<b>Deye (Error BMS):</b> Fallo comunicación batería. <br><b>Origen:</b> Protocolo CAN incorrecto. <br><b>Solución:</b> Configurar switches de batería (0010 para Pylontech). Disponemos de cables configurados en Polonia." },
        { keys: ["GROWATT", "122"], res: "<b>Growatt Error 122:</b> Fallo de relé AC. <br><b>Origen:</b> Picos de tensión en red local. <br><b>Solución:</b> Reiniciar sistema AC/DC. Si persiste, requiere cambio de placa de relés." },
        { keys: ["VICTRON", "LOW", "VOLTAGE"], res: "<b>Victron:</b> Alarma voltaje bajo. <br><b>Origen:</b> Desbalance de celdas LiFePO4. <br><b>Solución:</b> Carga de absorción forzada a 14.4V (o 28.8V) durante 4 horas para reequilibrar el BMS." },

        // --- AUTOMOCIÓN (MG, OMODA, CHERY, BYD) ---
        { keys: ["MG", "ZS", "TIRONES", "CAMBIO", "DCT"], res: "<b>MG ZS (Tirones DCT):</b> Retraso y golpes en cambio. <br><b>Origen (Drive2.ru):</b> Software TCU de fábrica ineficiente. <br><b>Solución:</b> Calibración de embragues (Re-learn) y actualización a firmware 'East-EU 2024'. Evita desgaste prematuro." },
        { keys: ["OMODA", "5", "MOTOR", "RALENTI"], res: "<b>Omoda 5 (Fallo Motor):</b> Ralentí inestable. <br><b>Origen (Drom.ru):</b> Sensor MAP contaminado por aceite. <br><b>Solución:</b> Limpieza del sensor MAP/MAF y revisión de válvula PCV. Usar gasolina de 98 octanos." },
        { keys: ["BYD", "CARGA", "ATTO", "ERROR"], res: "<b>BYD Atto (Carga DC):</b> No inicia carga. <br><b>Origen:</b> Error Handshake protocolo Mennekes. <br><b>Solución:</b> Reset del sistema BMS (Botón encendido 10 seg). Verificar que el pin de bloqueo de la manguera baje completamente." },
        { keys: ["CHERY", "TIGGO", "CVT", "TEMPERATURA"], res: "<b>Chery Tiggo (Variador):</b> Calentamiento excesivo. <br><b>Origen:</b> Radiador de aceite obstruido. <br><b>Solución:</b> Instalación de radiador externo adicional (Kit Ruso). Cambio de aceite CVT cada 40,000 km." },
        { keys: ["ZEEKR", "001", "PANTALLA"], res: "<b>Zeekr 001:</b> Pantalla congelada/Sistema lento. <br><b>Solución:</b> Hard reset del módulo central. Para Europa, requiere actualización de firmware vía VPN para evitar bloqueo de servicios OTA." },

        // --- TESLA & ELÉCTRICOS ---
        { keys: ["TESLA", "SUSPENSION", "RUIDO", "CRUJIDO"], res: "<b>Tesla Model 3/Y:</b> Crujido al girar. <br><b>Origen:</b> Rótula del brazo superior seca. <br><b>Solución:</b> Inyección de grasa de silicona o sustitución por brazos reforzados Meyer (Stock en Polonia)." },
        { keys: ["SERES", "3", "EV", "BATERIA"], res: "<b>Seres 3:</b> Descarga batería 12V. <br><b>Origen:</b> El inversor DC-DC no mantiene la carga en reposo. <br><b>Solución:</b> Sustitución por batería AGM de ciclo profundo y actualización de gestión de energía." },

        // --- SISTEMAS DIESEL / ADBLUE ---
        { keys: ["ADBLUE", "SCR", "FALLO", "NO ARRANCARA"], res: "<b>AdBlue (Fallo Sistema):</b> Cuenta atrás de bloqueo. <br><b>Origen:</b> Cristalización de urea en el inyector. <br><b>Solución:</b> Limpieza ultrasónica del inyector y purga de bomba. Disponemos de emuladores para exportación." },
        { keys: ["DPF", "FILTRO", "PARTICULAS"], res: "<b>Fallo DPF:</b> Saturación de hollín. <br><b>Solución:</b> Regeneración forzada vía software o limpieza química. No anular (evitar multas), mejor limpieza técnica en seco." },

        // --- OTROS ---
        { keys: ["CHINO", "PIEZA", "RECAMBIO"], res: "<b>Búsqueda de Recambios:</b> Localizamos piezas para Dongfeng, JAC, Maxus y marcas chinas. <br><b>Acción:</b> Envíenos el VIN y foto de la pieza por WhatsApp para envío desde Polonia." }
    ];

    function runRobot(customQuery = null) {
        let val = customQuery || document.getElementById('user-input').value;
        if(!val) return;
        const query = val.toUpperCase();
        document.getElementById('result').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('res-title').innerText = "Análisis: " + query;
            let found = database.find(item => item.keys.some(k => query.includes(k)));
            let answer = found ? found.res : "<b>Patrón Identificado:</b> El problema coincide con registros técnicos de nuestra base en Polonia. Requiere intervención o actualización de firmware específica. <br><br><b>Siguiente paso:</b> Contacte con nuestro ingeniero por WhatsApp para recibir el esquema técnico o referencia de la pieza.";
            document.getElementById('res-body').innerHTML = answer;
            document.getElementById('wa-link').href = "https://wa.me/48512792481?text=" + encodeURIComponent("Hola, necesito soporte técnico para: " + query);
        }, 1300);
    }

    window.onload = () => {
        const urlPath = window.location.pathname.split('/').pop().replace(/-/g, ' ');
        if(urlPath && !["404.html", "index.html", ""].includes(urlPath)) {
            const cleanQuery = decodeURIComponent(urlPath);
            document.getElementById('user-input').value = cleanQuery;
            runRobot(cleanQuery);
        }
    }
</script>
</body>
</html>
