<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixVolt Engineering | Premium Technical Support & Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #ff6b00; 
            --accent-glow: rgba(255, 107, 0, 0.35);
            --bg: #030712; 
            --card-bg: rgba(17, 24, 39, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Анимированный фон (сетка инженера) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 107, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* Навигация */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 8%; 
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: 800; color: white; text-decoration: none; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        .nav-links a { 
            color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 13px; 
            margin-left: 25px; transition: 0.3s; text-transform: uppercase;
        }
        .nav-links a:hover { color: var(--accent); }

        /* Hero-блок */
        .hero { 
            padding: 140px 8% 100px; 
            text-align: center;
            position: relative;
        }

        .hero-badge {
            background: rgba(255, 107, 0, 0.1);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--accent);
            display: inline-block;
            margin-bottom: 25px;
        }

        h1 { 
            font-size: clamp(40px, 6vw, 72px); 
            font-weight: 800; 
            margin: 0 0 25px; 
            line-height: 1.05;
            letter-spacing: -2px;
        }

        .hero p { 
            font-size: clamp(18px, 2vw, 22px); 
            color: var(--text-dim); 
            max-width: 800px; 
            margin: 0 auto 50px; 
        }

        .btn-primary { 
            background: var(--accent); 
            color: white; 
            padding: 22px 50px; 
            border-radius: 14px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 18px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
            box-shadow: 0 15px 35px var(--accent-glow);
        }
        .btn-primary:hover { 
            transform: scale(1.05) translateY(-5px); 
            box-shadow: 0 20px 45px var(--accent-glow);
        }

        /* Сетка сервисов */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
            padding: 60px 8%; 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px; 
            border-radius: 30px; 
            transition: 0.4s;
            backdrop-filter: blur(5px);
        }
        .card:hover { 
            border-color: var(--accent);
            background: rgba(17, 24, 39, 0.9);
            transform: translateY(-10px);
        }

        .card h3 { font-size: 26px; margin-bottom: 20px; color: var(--accent); }
        .card p { color: var(--text-dim); font-size: 16px; margin-bottom: 0; }

        /* Инженерный блок */
        .hub-section { 
            margin: 100px 8%; 
            background: linear-gradient(145deg, #111827, #030712);
            border-radius: 40px;
            padding: 80px;
            border: 1px solid rgba(255, 255, 255, 0.05);
