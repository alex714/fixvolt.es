<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixVolt | Asistente de Diagnóstico Técnico</title>
    <style>
        :root { --accent: #ff6b00; --dark: #0f172a; }
        body { font-family: sans-serif; line-height: 1.6; color: #334155; max-width: 800px; margin: 0 auto; padding: 20px; background: #f8fafc; }
        .container { background: #fff; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* Поисковая строка */
        .search-area { margin-bottom: 30px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--dark); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .solution-card { border-left: 5px solid var(--accent); background: #fffcf9; padding: 20px; border-radius: 10px; display: none; margin-top: 20px; }
        .loader { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: var(--accent); }
        .btn-wa { display: block; background: #25d366; color: white; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Asistente de Soporte Técnico FixVolt</h2>
    <p>Introduzca el código de error o modelo del vehículo/inversor para consultar las bases de datos de ingeniería (RU/PL/ES).</p>

    <div class="search-area">
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Ejemplo: MG ZS Fallo Motor o Huawei 2062...">
            <button onclick="runRobot()">ANALIZAR</button>
        </div>
    </div>

    <div id="loader" class="loader">Escaneando bases de datos internacionales...</div>

    <div id="result" class="solution-card">
        <h3 id="res-title" style="margin-top:0;"></h3>
        <div id="res-body"></div>
        
        <a href="https://wa.me/48512792481?text=Hola, soporte para " id="wa-link" class="btn-wa">
            SOPORTE TÉCNICO VÍA WHATSAPP
        </a>
    </div>
</div>

<script>
    const database = [
        { keys: ["HUAWEI", "2062", "AISLAMIENTO"], res: "<b>HUAWEI SUN2000 (Error 2062):</b> Baja resistencia de aislamiento DC. Según Forumhouse.ru, el 80% de los casos se debe a humedad en conectores MC4. Acción: Limpiar y secar conectores. Si persiste, revisar derivación a tierra de la estructura." },
        { keys: ["MG", "ZS", "TIRONES", "FALLO"], res: "<b>MG ZS (Gestión Motor/Caja):</b> Reportes en Drive2.ru indican que el software original causa retardos. Solución: Actualización de TCU/ECU versión 2024 y calibración del embrague vía OBD2." },
        { keys: ["OMODA", "5", "MOTOR", "TURBO"], res: "<b>OMODA 5 (Fallo Motor):</b> Sensor de presión (MAP) propenso a ensuciarse por vapores. Los registros de Drom.ru sugieren limpieza del sensor y uso de combustible de alta calidad para evitar depósitos en inyectores." },
        { keys: ["BYD", "CARGA", "ERROR"], res: "<b>BYD Series:</b> Errores de comunicación con cargadores Mennekes. Realizar reset del sistema BMS (10 segundos botón power) para reestablecer protocolos de carga rápida." }
    ];

    function runRobot(customQuery = null) {
        const query = (customQuery || document.getElementById('user-input').value).toUpperCase();
        if(!query) return;

        // Визуальная работа робота
        document.getElementById('result').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('res-title').innerText = "Análisis: " + query;

            let answer = "No hemos encontrado un registro exacto para este código, pero nuestros ingenieros en Polonia pueden consultar el manual de taller original. Contacte por WhatsApp.";
            
            for(let item of database) {
                if(item.keys.some(k => query.includes(k))) {
                    answer = item.res;
                    break;
                }
            }

            document.getElementById('res-body').innerHTML = answer;
            document.getElementById('wa-link').href = "https://wa.me/48512792481?text=" + encodeURIComponent("Hola, necesito soporte para: " + query);
        }, 1200);
    }

    // Авто-запуск если запрос в URL (из Google)
    window.onload = () => {
        const urlPath = window.location.pathname.split('/').pop().replace(/-/g, ' ');
        if(urlPath && urlPath !== "404.html") {
            document.getElementById('user-input').value = decodeURIComponent(urlPath);
            runRobot(decodeURIComponent(urlPath));
        }
    }
</script>

</body>
</html>
